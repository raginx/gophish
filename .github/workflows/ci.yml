name: CI
on:
  - pull_request
  - push
jobs:

  build:
    name: Build
    runs-on: ubuntu-latest
    strategy:
      matrix:
        goVer: ["1.25", "1.26"]

    steps:
    - name: Set up Go ${{ matrix.goVer }}
      uses: actions/setup-go@v7
      with:
        go-version: ${{ matrix.goVer }}
      id: go

    - name: Check out code into the Go module directory
      uses: actions/checkout@v4

    - name: Get dependencies
      run: |
        go get -v -t -d ./...
        go get gopkg.in/check.v1

    - name: Build
      run: go build -v .
    
    - name: Format
      run: diff -u <(echo -n) <(gofmt -d .)
    
    - name: Test
      run: go test ./...

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v7
      with:
        go-version: "1.26"

    - name: golangci-lint
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        # Codebase predates linting (74 pre-existing issues); only fail on
        # issues introduced by new changes until the backlog is cleaned up.
        only-new-issues: true

  vulncheck:
    name: Vulnerability check
    runs-on: ubuntu-latest
    steps:
    - name: Check out code
      uses: actions/checkout@v4

    - name: Set up Go
      uses: actions/setup-go@v7
      with:
        go-version: "1.26"

    - name: Run govulncheck
      uses: golang/govulncheck-action@v1
      with:
        go-version-input: "1.26"
